<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple TO-DO List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simple TO-DO List</h1>
<p>Welcome to Simple TO-DO List! You can double click a task to edit it!</p>

    <input type="text" id="todo-input" placeholder="Enter a todo and press Add or Enter to add new task">
    <button id="add-btn">Add</button>
    <ul id="todo-list"> </ul>
    <script src="script.js"></script>
</body>
</html>
